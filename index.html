<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Options Trading Workflow</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header class="hero">
      <div>
        <h1>Options Trading Workflow</h1>
        <p>Saved sessions, best-four submission, and scenario diversity checks.</p>
      </div>
      <div class="header-actions">
        <button data-screen="dashboard">Dashboard</button>
        <button data-screen="scenarios">Scenarios</button>
        <button data-screen="library">Saved sessions</button>
        <button data-screen="submit">Final submission</button>
      </div>
    </header>

    <section class="card">
      <div class="grid two">
        <div>
          <label>Candidate name</label>
          <input id="studentName" type="text" placeholder="Enter candidate name" />
        </div>
        <div>
          <label>Candidate number</label>
          <input id="studentNumber" type="text" placeholder="Enter candidate number" />
        </div>
      </div>
      <div class="grid two top-gap">
        <div>
          <label>Mode</label>
          <select id="modeSelect">
            <option value="practice">Practice mode</option>
            <option value="assessment">Assessment mode</option>
          </select>
        </div>
        <div class="actions bottom-align">
          <button id="resetAllBtn" class="secondary">Reset all browser data</button>
        </div>
      </div>
    </section>

    <section id="dashboard" class="screen"></section>
    <section id="scenarios" class="screen hidden"></section>
    <section id="session" class="screen hidden"></section>
    <section id="summary" class="screen hidden"></section>
    <section id="library" class="screen hidden"></section>
    <section id="submit" class="screen hidden"></section>
  </div>

  <script src="app.js"></script>
</body>
</html>
